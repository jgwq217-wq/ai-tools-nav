<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 工具导航站 - 发现最实用的 AI 工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0f0f0f; color: #e5e5e5; min-height: 100vh; line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 0 20px; }
        h1 {
            font-size: 2.5rem; margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .subtitle { color: #888; font-size: 1rem; }
        .stats { color: #666; font-size: 0.85rem; margin-top: 6px; }
        .search-box { margin: 24px 0; display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }
        .search-input {
            width: 100%; max-width: 500px; padding: 14px 20px; font-size: 15px;
            border: 2px solid #333; border-radius: 12px;
            background-color: #1a1a1a; color: #e5e5e5; outline: none; transition: all 0.3s;
        }
        .search-input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.2); }
        .submit-btn {
            padding: 14px 24px; font-size: 14px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2); color: white;
            cursor: pointer; font-weight: 600; transition: all 0.3s; white-space: nowrap;
        }
        .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .tags { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 24px; }
        .tag-btn {
            padding: 8px 18px; border: 2px solid #333; border-radius: 20px;
            background-color: #1a1a1a; color: #888; cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        .tag-btn:hover { border-color: #667eea; color: #667eea; }
        .tag-btn.active { background-color: #667eea; border-color: #667eea; color: white; }
        .result-count { text-align: center; color: #555; font-size: 0.85rem; margin-bottom: 16px; }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .tool-card {
            background-color: #1a1a1a; border: 1px solid #333; border-radius: 16px;
            padding: 24px; transition: all 0.3s; position: relative;
        }
        .tool-card:hover {
            transform: translateY(-4px); border-color: #667eea;
            box-shadow: 0 10px 30px rgba(102,126,234,0.15);
        }
        .tool-icon { font-size: 2rem; margin-bottom: 10px; }
        .tool-name { font-size: 1.2rem; font-weight: 600; color: #fff; margin-bottom: 6px; }
        .tool-desc { color: #888; font-size: 0.9rem; margin-bottom: 14px; }
        .tool-tag {
            display: inline-block; padding: 3px 10px; background-color: #2a2a2a;
            border-radius: 10px; font-size: 0.75rem; color: #aaa; margin-bottom: 14px;
        }
        .tool-price {
            display: inline-block; padding: 3px 10px; border-radius: 10px;
            font-size: 0.75rem; margin-bottom: 14px; margin-left: 6px;
        }
        .price-free { background-color: #0d3b1e; color: #4ade80; }
        .price-paid { background-color: #3b1e0d; color: #f59e0b; }
        .visit-btn {
            display: inline-block; padding: 10px 20px; background-color: #3b82f6;
            color: white; text-decoration: none; border-radius: 8px; font-size: 0.85rem;
            transition: all 0.2s; border: none; cursor: pointer;
        }
        .visit-btn:hover { background-color: #2563eb; }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #1a1a1a; border: 1px solid #333; border-radius: 20px;
            padding: 32px; max-width: 480px; width: 90%; max-height: 90vh; overflow-y: auto;
        }
        .modal h2 { color: #fff; margin-bottom: 6px; }
        .modal p { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        .modal input, .modal select, .modal textarea {
            width: 100%; padding: 12px 16px; margin-bottom: 12px; font-size: 14px;
            border: 2px solid #333; border-radius: 10px;
            background-color: #0f0f0f; color: #e5e5e5; outline: none;
        }
        .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: #667eea; }
        .modal textarea { min-height: 80px; resize: vertical; }
        .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
        .modal-btns button {
            padding: 10px 20px; border-radius: 10px; font-size: 14px; cursor: pointer; border: none;
        }
        .btn-cancel { background: #333; color: #aaa; }
        .btn-confirm { background: linear-gradient(135deg, #667eea, #764ba2); color: white; font-weight: 600; }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #10b981; color: white; padding: 12px 28px; border-radius: 12px;
            font-size: 14px; font-weight: 600; z-index: 2000;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .toast.show { opacity: 1; }
        footer {
            text-align: center; padding: 40px 20px; color: #555; font-size: 0.85rem;
            border-top: 1px solid #222; margin-top: 40px;
        }
        footer a { color: #667eea; text-decoration: none; }
        footer a:hover { text-decoration: underline; }
        @media (max-width: 640px) {
            h1 { font-size: 1.8rem; }
            .tools-grid { grid-template-columns: 1fr; }
            .search-input { max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI 工具导航站</h1>
            <p class="subtitle">发现最实用的 AI 工具</p>
            <p class="stats">收录 <strong id="toolCount">0</strong> 个工具</p>
        </header>

        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索 AI 工具...">
            <button class="submit-btn" onclick="openModal()">推荐工具</button>
        </div>

        <div class="tags" id="tagsContainer"></div>
        <div class="result-count" id="resultCount"></div>
        <div class="tools-grid" id="toolsGrid"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h2>推荐 AI 工具</h2>
            <p>发现了好用的 AI 工具？填下表，审核通过后收录。</p>
            <input type="text" id="submitName" placeholder="工具名称 *" required>
            <input type="text" id="submitDesc" placeholder="一句话描述（不超过20字）*" maxlength="20" required>
            <select id="submitCategory">
                <option value="">选择分类</option>
            </select>
            <input type="text" id="submitPrice" placeholder="价格（免费 / 免费+付费 / 付费）">
            <input type="url" id="submitUrl" placeholder="官网链接 *" required>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-confirm" onclick="submitTool()">提交</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <footer>
        <p>由 TRAE IDE + DeepSeek 搭建 | 一人公司项目 #1 | Built in Public · 2026</p>
        <p style="margin-top:6px;"><a href="#" onclick="openModal();return false;">提交工具</a> · 每日更新中</p>
    </footer>

    <script>
        const tools = [
            { name:'DeepSeek', desc:'国产深度推理大模型', cat:'大模型', icon:'', price:'免费+付费', url:'https://chat.deepseek.com' },
            { name:'Kimi', desc:'超长上下文AI助手', cat:'大模型', icon:'', price:'免费+付费', url:'https://kimi.moonshot.cn' },
            { name:'通义千问', desc:'阿里多模态旗舰模型', cat:'大模型', icon:'', price:'免费+付费', url:'https://tongyi.aliyun.com/qianwen' },
            { name:'豆包', desc:'字节跳动AI助手', cat:'大模型', icon:'', price:'免费', url:'https://www.doubao.com' },
            { name:'文心一言', desc:'百度大语言模型', cat:'大模型', icon:'', price:'免费+付费', url:'https://yiyan.baidu.com' },
            { name:'智谱清言', desc:'GLM系列大模型', cat:'大模型', icon:'', price:'免费+付费', url:'https://chatglm.cn' },
            { name:'百川智能', desc:'百川大模型搜索增强', cat:'大模型', icon:'', price:'免费+付费', url:'https://www.baichuan-ai.com' },
            { name:'腾讯混元', desc:'腾讯自研大模型', cat:'大模型', icon:'', price:'免费+付费', url:'https://hunyuan.tencent.com' },
            { name:'讯飞星火', desc:'科大讯飞认知大模型', cat:'大模型', icon:'', price:'免费+付费', url:'https://xinghuo.xfyun.cn' },

            { name:'ChatGPT', desc:'OpenAI 旗舰对话AI', cat:'对话AI', icon:'', price:'免费+付费', url:'https://chat.openai.com' },
            { name:'Claude', desc:'Anthropic 安全优先AI', cat:'对话AI', icon:'', price:'免费+付费', url:'https://claude.ai' },
            { name:'Gemini', desc:'Google 多模态AI', cat:'对话AI', icon:'', price:'免费+付费', url:'https://gemini.google.com' },
            { name:'Perplexity', desc:'AI搜索引擎', cat:'对话AI', icon:'', price:'免费+付费', url:'https://www.perplexity.ai' },
            { name:'Poe', desc:'多模型聚合对话平台', cat:'对话AI', icon:'', price:'免费+付费', url:'https://poe.com' },

            { name:'TRAE', desc:'字节AI编程IDE免费', cat:'编程', icon:'', price:'免费', url:'https://www.trae.ai' },
            { name:'通义灵码', desc:'阿里AI编码助手', cat:'编程', icon:'', price:'免费', url:'https://tongyi.aliyun.com/lingma' },
            { name:'Cursor', desc:'AI原生代码编辑器', cat:'编程', icon:'', price:'免费+付费', url:'https://cursor.sh' },
            { name:'GitHub Copilot', desc:'微软AI编程助手', cat:'编程', icon:'', price:'付费', url:'https://github.com/features/copilot' },
            { name:'Windsurf', desc:'Codeium AI IDE', cat:'编程', icon:'', price:'免费+付费', url:'https://codeium.com/windsurf' },
            { name:'CodeGeeX', desc:'智谱AI编程助手免费', cat:'编程', icon:'', price:'免费', url:'https://codegeex.cn' },
            { name:'MarsCode', desc:'字节AI编程助手', cat:'编程', icon:'', price:'免费', url:'https://www.marscode.cn' },
            { name:'Bolt.new', desc:'一句话生成全栈App', cat:'编程', icon:'', price:'免费+付费', url:'https://bolt.new' },
            { name:'Lovable', desc:'AI全栈应用生成器', cat:'编程', icon:'', price:'免费+付费', url:'https://lovable.dev' },

            { name:'即梦', desc:'字节AI图片生成', cat:'设计', icon:'', price:'免费+付费', url:'https://dreamina.jianying.com' },
            { name:'Midjourney', desc:'最强AI绘画工具', cat:'设计', icon:'', price:'付费', url:'https://www.midjourney.com' },
            { name:'Canva', desc:'AI辅助在线设计', cat:'设计', icon:'', price:'免费+付费', url:'https://www.canva.cn' },
            { name:'即时设计', desc:'国内Figma替代+AI', cat:'设计', icon:'', price:'免费+付费', url:'https://js.design' },
            { name:'Remove.bg', desc:'AI一键去背景', cat:'设计', icon:'', price:'免费+付费', url:'https://www.remove.bg' },

            { name:'秘塔写作猫', desc:'AI写作助手纠错', cat:'写作', icon:'', price:'免费+付费', url:'https://xiezuocat.com' },
            { name:'笔灵AI', desc:'国产AI写作工具', cat:'写作', icon:'', price:'免费+付费', url:'https://ibiling.cn' },
            { name:'Jasper', desc:'海外AI营销写作', cat:'写作', icon:'', price:'付费', url:'https://www.jasper.ai' },
            { name:'Grammarly', desc:'AI英文写作润色', cat:'写作', icon:'', price:'免费+付费', url:'https://www.grammarly.com' },
            { name:'Notion AI', desc:'笔记+AI写作', cat:'写作', icon:'', price:'付费', url:'https://www.notion.so/product/ai' },

            { name:'Gamma', desc:'AI一键生成PPT', cat:'效率', icon:'', price:'免费+付费', url:'https://gamma.app' },
            { name:'飞书智能伙伴', desc:'飞书内置AI助手', cat:'效率', icon:'', price:'免费+付费', url:'https://www.feishu.cn' },
            { name:'通义听悟', desc:'阿里AI音视频转文字', cat:'效率', icon:'', price:'免费+付费', url:'https://tingwu.aliyun.com' },
            { name:'Otter.ai', desc:'AI会议记录转录', cat:'效率', icon:'', price:'免费+付费', url:'https://otter.ai' },
            { name:'Monica', desc:'AI浏览器全能助手', cat:'效率', icon:'', price:'免费+付费', url:'https://monica.im' },

            { name:'可灵', desc:'快手AI视频生成', cat:'视频', icon:'', price:'免费+付费', url:'https://kling.kuaishou.com' },
            { name:'剪映', desc:'字节AI视频剪辑', cat:'视频', icon:'', price:'免费+付费', url:'https://www.capcut.cn' },
            { name:'Suno', desc:'AI音乐生成', cat:'视频', icon:'', price:'免费+付费', url:'https://suno.com' },
            { name:'Runway', desc:'AI视频编辑与生成', cat:'视频', icon:'', price:'付费', url:'https://runwayml.com' },
            { name:'Pika', desc:'AI短视频生成', cat:'视频', icon:'', price:'免费+付费', url:'https://pika.art' },
            { name:'HeyGen', desc:'AI数字人视频生成', cat:'视频', icon:'', price:'付费', url:'https://www.heygen.com' },

            { name:'扣子Coze', desc:'字节AI Bot搭建平台', cat:'其他', icon:'', price:'免费', url:'https://www.coze.cn' },
            { name:'Dify', desc:'开源LLM应用平台', cat:'其他', icon:'', price:'免费+付费', url:'https://dify.ai' },
        ];

        const categories = ['all','大模型','对话AI','编程','设计','写作','效率','视频','其他'];
        const catLabels = { all:'全部', '大模型':'大模型', '对话AI':'对话AI', '编程':'编程', '设计':'设计', '写作':'写作', '效率':'效率', '视频':'视频', '其他':'其他' };

        let currentCategory = 'all';
        let currentSearch = '';

        function init() {
            const tc = document.getElementById('tagsContainer');
            tc.innerHTML = categories.map(c => '<button class="tag-btn'+(c==='all'?' active':'')+'" data-category="'+c+'">'+catLabels[c]+'</button>').join('');
            const sc = document.getElementById('submitCategory');
            sc.innerHTML = categories.filter(c=>c!=='all').map(c=>'<option value="'+c+'">'+catLabels[c]+'</option>').join('');
            document.getElementById('toolCount').textContent = tools.length;
            renderTools();
        }

        function renderTools() {
            const filtered = tools.filter(t => {
                const mCat = currentCategory==='all' || t.cat===currentCategory;
                const mSearch = t.name.toLowerCase().includes(currentSearch) || t.desc.toLowerCase().includes(currentSearch) || t.cat.includes(currentSearch);
                return mCat && mSearch;
            });
            document.getElementById('resultCount').textContent = '共 '+filtered.length+' 个工具';
            const grid = document.getElementById('toolsGrid');
            grid.innerHTML = filtered.map(t => {
                const pc = t.price==='免费'?'price-free':'price-paid';
                const icon = t.icon || '';
                return '<div class="tool-card"><div class="tool-icon">'+icon+'</div><div class="tool-name">'+t.name+'</div><div class="tool-desc">'+t.desc+'</div><span class="tool-tag">'+t.cat+'</span><span class="tool-price '+pc+'">'+t.price+'</span><a href="'+t.url+'" class="visit-btn" target="_blank" rel="noopener">访问官网</a></div>';
            }).join('');
        }

        document.getElementById('tagsContainer').addEventListener('click', e => {
            if(e.target.classList.contains('tag-btn')){
                document.querySelectorAll('.tag-btn').forEach(b=>b.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.dataset.category;
                renderTools();
            }
        });

        document.getElementById('searchInput').addEventListener('input', e => {
            currentSearch = e.target.value.trim();
            renderTools();
        });

        function openModal(){ document.getElementById('modalOverlay').classList.add('show'); }
        function closeModal(e){ if(!e||e.target===document.getElementById('modalOverlay')){document.getElementById('modalOverlay').classList.remove('show');} }

        function submitTool(){
            var n=document.getElementById('submitName').value.trim();
            var d=document.getElementById('submitDesc').value.trim();
            var c=document.getElementById('submitCategory').value;
            var p=document.getElementById('submitPrice').value.trim()||'未知';
            var u=document.getElementById('submitUrl').value.trim();
            if(!n||!d||!c||!u){showToast('请填写必填项');return;}
            tools.push({name:n,desc:d,cat:c,icon:'',price:p,url:u});
            document.getElementById('toolCount').textContent = tools.length;
            document.getElementById('modalOverlay').classList.remove('show');
            ['submitName','submitDesc','submitPrice','submitUrl'].forEach(function(id){document.getElementById(id).value='';});
            renderTools();
            showToast('工具已提交');
        }

        function showToast(msg){
            var t=document.getElementById('toast');
            t.textContent=msg; t.classList.add('show');
            setTimeout(function(){t.classList.remove('show');},2500);
        }

        document.addEventListener('keydown',function(e){if(e.key==='Escape')document.getElementById('modalOverlay').classList.remove('show');});

        init();
    </script>
</body>
</html>
